<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Background Circle -->
  <circle cx="100" cy="100" r="90" fill="#F4A261"></circle>

  <!-- Plate -->
  <circle cx="100" cy="110" r="40" fill="none" stroke="#FFFFFF" stroke-width="4"></circle>

  <!-- Fork -->
  <g stroke="#FFFFFF" stroke-width="4" stroke-linecap="round">
    <line x1="75" y1="60" x2="75" y2="100"></line>
    <line x1="70" y1="60" x2="70" y2="75"></line>
    <line x1="75" y1="60" x2="75" y2="75"></line>
    <line x1="80" y1="60" x2="80" y2="75"></line>
  </g>

  <!-- Spoon -->
  <g stroke="#FFFFFF" stroke-width="4" fill="none">
    <ellipse cx="125" cy="68" rx="8" ry="12"></ellipse>
    <line x1="125" y1="80" x2="125" y2="100" stroke-linecap="round"></line>
  </g>

  <!-- Restaurant Name -->
  <text x="100" y="165" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" font-weight="bold">
    TASTY BITE
  </text>
</svg>